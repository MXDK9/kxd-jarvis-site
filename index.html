<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KXD AI - Advanced Cognitive Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --hud: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --acc: #6366f1; --txt: #f0f0f0; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, var(--acc) 0%, transparent 60%); }
        .main { width: 100%; max-width: 900px; height: 100%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        header { border-bottom: 1px solid var(--border); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 600; letter-spacing: -1px; }
        .status { font-size: 13px; color: #909090; background: var(--hud); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.thinking { background: var(--acc); animation: pulse 1s infinite alternate; box-shadow: 0 0 10px var(--acc); }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        #chat { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 80%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; font-size: 15px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--hud); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); border-bottom-left-radius: 4px; }
        .input-bar { display: flex; gap: 12px; background: var(--hud); padding: 10px; border-radius: 30px; border: 1px solid var(--border); margin-top: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; font-size: 16px; outline: none; }
        button { background: var(--acc); color: white; border: none; padding: 0 25px; border-radius: 25px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="main">
        <header>
            <div class="logo">KXD AI</div>
            <div class="status"><div id="dot" class="dot"></div><span id="st">Active Network</span></div>
        </header>
        <div id="chat"></div>
        <div class="input-bar">
            <input type="text" id="txt" placeholder="Talk to KD..." autocomplete="off">
            <button id="btn">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
