<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KXD JARVIS v11.1 - Absolute Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body.quantum-hud { 
            background: #000; color: #0ff; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh; /* 100dvh ensures perfect fit on all mobile screens */
            overflow: hidden; 
        }
        .hud-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box; 
            border: 1px solid rgba(0, 255, 255, 0.2); 
        }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #0ff; padding-bottom: 10px; 
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2); 
            flex-wrap: wrap; gap: 10px;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 28px; text-shadow: 0 0 15px #0ff; letter-spacing: 2px; }
        .v-core { font-size: 14px; opacity: 0.8; color: #f0f; }
        .status-bar { font-size: 16px; font-weight: 500; text-align: right; }
        
        .chat-interface { flex: 1; display: flex; flex-direction: column; margin-top: 20px; overflow-y: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; border-left: 2px solid rgba(0, 255, 255, 0.2); scroll-behavior: smooth; }
        
        .input-area { 
            display: flex; margin-top: 15px; gap: 10px; 
            background: rgba(0, 20, 20, 0.8); padding: 10px; 
            border-radius: 8px; border: 1px solid #0ff; 
            align-items: center; justify-content: space-between;
        }
        input#txt { 
            flex: 1; background: transparent; border: none; color: #fff; 
            padding: 12px; font-family: 'Rajdhani'; font-size: 18px; outline: none; 
            min-width: 0;
        }
        button#exec-btn { 
            background: #0ff; color: #000; border: none; padding: 12px 25px; 
            font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; 
            border-radius: 4px;
        }
        button#exec-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        
        #mic-btn { 
            background: #222; border: 1px solid #0ff; border-radius: 50%; 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 20px; flex-shrink: 0; transition: 0.3s;
        }
        #mic-btn.active { background: #f00; box-shadow: 0 0 20px #f00; border-color: #fff; }
        #mic-btn:active { transform: scale(0.9); }
        
        .neural-visualizer { position: absolute; bottom: 85px; right: 30px; width: 60px; height: 60px; pointer-events: none;}
        .orb-glow { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #0ff; box-shadow: inset 0 0 30px #0ff, 0 0 30px #0ff; opacity: 0.6; }
        .sync-pulse { animation: pulse 0.4s infinite alternate; border-color: #f0f; box-shadow: inset 0 0 30px #f0f, 0 0 30px #f0f; }
        @keyframes pulse { from { opacity: 0.4; transform: scale(0.95); } to { opacity: 1; transform: scale(1.1); } }
        
        .msg { margin: 12px 0; padding: 15px; border-radius: 8px; line-height: 1.5; font-size: 17px; max-width: 85%; }
        .msg.user { border-right: 4px solid #0ff; background: rgba(0, 255, 255, 0.1); align-self: flex-end; margin-left: auto; text-align: right; }
        .msg.jarvis { border-left: 4px solid #f0f; background: rgba(255, 0, 255, 0.05); color: #fff; }
        #date-time { font-weight: bold; color: #0ff; }
        #system-status { color: #0f0; text-shadow: 0 0 5px #0f0; }

        /* --- EXTREME MOBILE OPTIMIZATION --- */
        @media(max-width: 768px) {
            .hud-container { padding: 8px; border: none; }
            header { flex-direction: column; text-align: center; gap: 5px; padding-bottom: 8px; }
            .logo { font-size: 24px; }
            .status-bar { text-align: center; font-size: 13px; }
            
            #chat-box { padding: 10px; border-left: none; border-top: 1px solid rgba(0, 255, 255, 0.2); margin-top: 10px; }
            .msg { font-size: 16px; max-width: 95%; padding: 12px; margin: 8px 0; }
            
            /* Text input and buttons stacked safely for touch */
            .input-area { padding: 8px; flex-wrap: wrap; gap: 8px; justify-content: center; border-radius: 12px;}
            input#txt { flex: 100%; font-size: 16px; padding: 12px; border-bottom: 1px solid rgba(0,255,255,0.3); text-align: center; }
            button#exec-btn { flex: 1; padding: 15px; font-size: 16px; border-radius: 8px; }
            #mic-btn { width: 55px; height: 55px; font-size: 22px; }
            
            /* Shrink HUD so it doesn't block screen */
            .neural-visualizer { bottom: auto; top: 12px; right: 12px; width: 35px; height: 35px; opacity: 0.4; }
        }
    </style>
</head>
<body class="quantum-hud">
    <div class="hud-container">
        <header>
            <div class="logo">KXD JARVIS <span class="v-core">v11.1 ABSOLUTE</span></div>
            <div class="status-bar">
                <span id="date-time">LOADING...</span> | 
                <span id="system-status">SYSTEM ONLINE</span>
            </div>
            <div class="neural-visualizer">
                <div id="orb" class="orb-glow"></div>
            </div>
        </header>

        <main class="chat-interface">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="txt" placeholder="Deploying v11.1... Listening, Boss." autocomplete="off">
                <button id="mic-btn">🎙️</button>
                <button id="exec-btn">EXECUTE</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
