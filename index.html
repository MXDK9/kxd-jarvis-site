<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KXD AI - Advanced</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            var(--bg-color): #050505;
            --surface-color: rgba(20, 20, 25, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f0;
            --text-secondary: #909090;
            --accent-color: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --user-bubble: rgba(255, 255, 255, 0.05);
            --ai-bubble: rgba(99, 102, 241, 0.1);
        }

        body { 
            background-color: #050505; 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }

        .ambient-blur {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .main-container { 
            position: relative; 
            width: 100%; 
            max-width: 900px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box; 
            z-index: 10;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 20px; 
            border-bottom: 1px solid var(--border-color);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

        .status-container {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface-color); padding: 6px 14px;
            border-radius: 20px; border: 1px solid var(--border-color);
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; transition: 0.3s; }
        .status-dot.thinking { background: var(--accent-color); box-shadow: 0 0 12px var(--accent-glow); animation: pulse-dot 1s infinite alternate; }

        @keyframes pulse-dot { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        .chat-interface { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 20px 0; scroll-behavior: smooth; 
            display: flex; flex-direction: column; gap: 20px;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .msg { display: flex; width: 100%; }
        .msg.user { justify-content: flex-end; }
        
        .msg-inner {
            max-width: 75%; padding: 14px 18px; border-radius: 18px;
            font-size: 15px; line-height: 1.5; letter-spacing: 0.2px; padding-bottom: 10px;
        }

        .msg.user .msg-inner { background: var(--user-bubble); border-bottom-right-radius: 4px; border: 1px solid var(--border-color); }
        .msg.assistant .msg-inner { background: var(--ai-bubble); border-bottom-left-radius: 4px; border: 1px solid rgba(99, 102, 241, 0.15); color: #fff; }

        .input-area { 
            display: flex; margin-top: 15px; gap: 12px; background: var(--surface-color); 
            padding: 8px; border-radius: 24px; border: 1px solid var(--border-color); 
            align-items: center; backdrop-filter: blur(20px);
        }

        #mic-btn { 
            background: transparent; border: none; border-radius: 50%; 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 20px; color: var(--text-secondary); transition: 0.2s;
        }

        #mic-btn:hover { background: var(--user-bubble); color: #fff;}
        #mic-btn:active { transform: scale(0.9); }

        input#txt { 
            flex: 1; background: transparent; border: none; color: #fff; 
            padding: 12px 10px; font-family: 'Inter', sans-serif; font-size: 16px; 
            outline: none; min-width: 0;
        }

        input#txt::placeholder { color: #555; }

        button#exec-btn { 
            background: var(--text-primary); color: #000; border: none; padding: 0 24px; height: 44px;
            font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; 
            transition: 0.3s; border-radius: 20px;
        }

        button#exec-btn:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }

        /* --- MOBILE --- */
        @media(max-width: 768px) {
            .main-container { padding: 10px; }
            header { padding-bottom: 15px; }
            .msg-inner { max-width: 90%; font-size: 15px; padding: 12px 16px; }
            .input-area { border-radius: 20px; padding: 6px; }
            input#txt { font-size: 15px; padding: 10px 5px; }
            button#exec-btn { padding: 0 18px; height: 40px; }
            #mic-btn { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="ambient-blur"></div>
    <div class="main-container">
        <header>
            <div class="brand">
                <div class="logo-text">KXD AI</div>
            </div>
            <div class="status-container">
                <div id="status-dot" class="status-dot online"></div>
                <span id="system-status">System Active</span>
            </div>
        </header>

        <main class="chat-interface">
            <div id="chat-box"></div>
            <div class="input-area">
                <button id="mic-btn">🎙️</button>
                <input type="text" id="txt" placeholder="Talk to KXD..." autocomplete="off">
                <button id="exec-btn">Send</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
