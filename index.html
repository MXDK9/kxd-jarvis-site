<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KXD AI - Advanced Cognitive Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --hud: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --acc: #00e5ff; --txt: #f0f0f0; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .main { width: 100%; max-width: 900px; height: 100%; display: flex; flex-direction: column; padding: 20px; backdrop-filter: blur(10px); position: relative; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; color: #fff; }
        .status { font-size: 10px; color: var(--acc); background: rgba(0, 229, 255, 0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.2); display: flex; align-items: center; gap: 8px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); box-shadow: 0 0 10px var(--acc); }
        .dot.thinking { animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
        #chat { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--hud); border: 1px solid var(--border); color: #fff; }
        .ai { align-self: flex-start; background: rgba(0, 229, 255, 0.03); border: 1px solid rgba(0, 229, 255, 0.1); color: var(--acc); }
        .input-area { display: flex; gap: 12px; padding: 20px 0; border-top: 1px solid var(--border); z-index: 10; }
        input { flex: 1; background: var(--hud); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: #fff; outline: none; transition: 0.2s; font-size: 16px; }
        input:focus { border-color: var(--acc); background: rgba(0, 229, 255, 0.05); }
        button { background: var(--acc); border: none; border-radius: 10px; padding: 0 24px; color: #000; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3); }

        /* MOBILE FIXES */
        @media (max-width: 600px) {
            .main { padding: 15px; }
            header { flex-direction: column; gap: 12px; text-align: center; padding-bottom: 20px; }
            .status { order: 2; }
            .logo { order: 1; }
            .msg { max-width: 92%; font-size: 0.9rem; }
            .input-area { padding: 15px 0; }
            button { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <div id="particles-js" style="position: absolute; width: 100%; height: 100%; z-index: 1;"></div>
    <div class="main">
        <header>
            <div class="logo">KXD AI CORE</div>
            <div class="status">
                <div class="dot thinking" id="statusDot"></div>
                <span id="statusTxt">CORE LINK ACTIVE</span>
            </div>
        </header>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="NEURAL COMMAND..." autocomplete="off">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>
    <script src="particles.js"></script>
    <script src="app.js"></script>
</body>
</html>
