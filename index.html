<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>KXD AI - Advanced Cognitive Core</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
    :root { --bg: #030303; --hud: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --acc: #00e5ff; --txt: #f0f0f0; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, rgba(0,229,255,0.15) 0%, transparent 60%); }
    .main { width: 100%; max-width: 900px; height: 100%; display: flex; flex-direction: column; padding: 20px; backdrop-filter: blur(10px); position: relative; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
    .status { font-size: 11px; color: #00e5ff; background: rgba(0,229,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0,229,255,0.2); display: flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: 0.5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
    .dot.thinking { animation: pulse 0.8s infinite alternate; }
    @keyframes pulse { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
    #chat { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; line-height: 1.5; font-size: 14px; animation: slide 0.3s ease-out; position: relative; overflow-wrap: break-word; }
    @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user { align-self: flex-end; background: var(--hud); border: 1px solid var(--border); border-bottom-right-radius: 4px; color: #fff; }
    .ai { align-self: flex-start; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); border-bottom-left-radius: 4px; color: #e0faff; }
    .input-area { background: var(--hud); padding: 8px; border-radius: 30px; border: 1px solid var(--border); margin-top: 10px; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    input { flex: 1; background: transparent; border: none; color: white; padding: 12px 18px; font-size: 15px; outline: none; }
    button { background: var(--acc); color: #000; border: none; padding: 12px 24px; border-radius: 25px; font-weight: 800; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,229,255,0.4); }
    button:active { transform: scale(0.95); }
    
    /* MOBILE OPTIMIZATION */
    @media (max-width: 600px) {
        .main { padding: 15px 10px; }
        .logo { font-size: 1rem; }
        .msg { max-width: 92%; font-size: 13px; padding: 10px 15px; }
        button { padding: 10px 18px; font-size: 12px; }
        .input-area { padding: 5px; }
    }
    </style>

</head>

<body>

    <div class="main">

        <header>

            <div class="logo">KXD AI</div>

            <div class="status"><div id="dot" class="dot"></div><span id="st">Active Network</span></div>

        </header>

        <div id="chat"></div>

        <div class="input-bar">

            <input type="text" id="txt" placeholder="Talk to KD..." autocomplete="off">

            <button id="btn">Send</button>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
